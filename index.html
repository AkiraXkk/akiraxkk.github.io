<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acender e Apagar</title>
    <style>
        /* Configuração base */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.6s ease;
            overflow: hidden; /* Impede barras de rolagem */
        }

        /* --- CENA DE FUNDO --- */
        #scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- MODO CLARO (PADRÃO) --- */
        body {
            /* Fundo azul claro para o céu */
            background-color: #87CEEB;
        }

        #sun {
            position: absolute;
            top: 8%;
            right: 10%;
            width: 100px;
            height: 100px;
            background-color: #FFD700; /* Amarelo dourado */
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.7);
            transition: all 0.6s ease;
            opacity: 1;
            transform: scale(1);
        }

        .cloud-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden; /* Garante que as nuvens saiam da tela discretamente */
        }

        .cloud {
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50px;
            opacity: 0.8;
            transition: opacity 0.6s ease, transform 0.6s ease;
            transform: scale(1);
            animation: moveClouds 60s linear infinite; /* Animação de movimento */
        }

        /* Animação para mover as nuvens */
        @keyframes moveClouds {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-150%); } /* Ajustado para saírem completamente da tela */
        }

        /* Ajustando as posições iniciais das nuvens */
        #cloud1 {
            top: 20%;
            left: 10%; /* Posição inicial */
            width: 180px;
            height: 60px;
            animation-delay: 0s; /* Começa imediatamente */
        }
        #cloud1::before, #cloud1::after {
            content: '';
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50%;
        }
        #cloud1::before {
            width: 90px; height: 90px; top: -40px; left: 30px;
        }
        #cloud1::after {
            width: 120px; height: 120px; top: -50px; right: 20px;
        }

        #cloud2 {
            top: 35%;
            left: 50%; /* Posição inicial */
            width: 150px;
            height: 50px;
            animation-delay: -30s; /* Começa na metade do ciclo da animação */
        }
        #cloud2::before {
            content: '';
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50%;
            width: 80px; height: 80px; top: -35px; left: 25px;
        }

        #cloud3 {
            top: 15%;
            left: 80%; /* Posição inicial */
            width: 200px;
            height: 70px;
            animation-delay: -15s; /* Começa em outro ponto do ciclo */
        }
        #cloud3::before, #cloud3::after {
            content: '';
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50%;
        }
        #cloud3::before {
            width: 100px; height: 100px; top: -45px; left: 40px;
        }
        #cloud3::after {
            width: 130px; height: 130px; top: -60px; right: 30px;
        }


        /* --- MODO ESCURO (DARK MODE) --- */
        
        /* Fundo do céu noturno */
        body.dark-mode {
            background-color: #0b0b23; /* Azul muito escuro */
        }

        /* Esconde o sol e as nuvens no modo escuro */
        body.dark-mode #sun,
        body.dark-mode .cloud {
            opacity: 0;
            transform: scale(0);
        }

        /* Estrelas (usando box-shadow para criar múltiplas estrelas) */
        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Garante que as estrelas fiquem dentro da tela */
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0; /* Começam invisíveis */
            animation: twinkle 3s infinite alternate ease-in-out;
        }

        /* Animação de brilho (piscar) */
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

        body.dark-mode #stars-container {
            opacity: 1;
        }

        /* Lua */
        #moon {
            position: absolute;
            top: 8%;
            right: 10%;
            width: 90px;
            height: 90px;
            background-color: #F0F0F0; /* Cor da lua */
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(240, 240, 240, 0.5); /* Brilho da lua */
            transition: all 0.6s ease;
            opacity: 0; /* Começa invisível */
            transform: scale(0);
        }

        body.dark-mode #moon {
            opacity: 1;
            transform: scale(1);
        }


        /* --- BOTÃO DE CONTROLE --- */
        #theme-toggle {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            background-color: #ffffff;
            
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 10; /* Garante que o botão esteja acima de tudo */
        }

        #theme-toggle:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            transform: translateX(-50%) translateY(-2px);
        }

        /* Estilo do botão no modo escuro */
        body.dark-mode #theme-toggle {
            background-color: #f0f0f0;
            color: #0b0b23;
        }

        /* --- MARCA D'ÁGUA / WATERMARK --- */
        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #000; /* Cor para o modo claro */
            text-decoration: none;
            opacity: 0.6;
            transition: all 0.3s ease;
            z-index: 10; /* Garante que a marca d'água esteja acima de tudo */
        }

        .watermark:hover {
            opacity: 1;
        }

        /* Cor da marca d'água no modo escuro */
        body.dark-mode .watermark {
            color: #fff; /* Cor para o modo escuro */
        }

    </style>
</head>
<body>

    <!-- Os elementos visuais do fundo --><div id="scene">
        <!-- Modo Claro --><div id="sun"></div>
        <div class="cloud-container">
            <div class="cloud" id="cloud1"></div>
            <div class="cloud" id="cloud2"></div>
            <div class="cloud" id="cloud3"></div>
        </div>

        <!-- Modo Escuro --><div id="moon"></div>
        <div id="stars-container"></div> <!-- Container para as estrelas dinâmicas --></div>

    <!-- O botão de controle --><button id="theme-toggle">Apagar</button>

    <script>
        // Pega o botão e o corpo (body) do documento
        const toggleButton = document.getElementById('theme-toggle');
        const body = document.body;
        const starsContainer = document.getElementById('stars-container');

        // Função para criar estrelas aleatoriamente
        function createStars() {
            const numStars = 100; // Número de estrelas
            starsContainer.innerHTML = ''; // Limpa estrelas existentes
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.width = star.style.height = `${Math.random() * 3 + 1}px`; // Tamanho de 1px a 4px
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 3}s`; // Atraso para brilhos variados
                starsContainer.appendChild(star);
            }
        }

        // Cria as estrelas assim que a página carrega
        createStars();

        // Adiciona um "ouvinte" para o evento de clique
        toggleButton.addEventListener('click', function() {
            
            // Adiciona ou remove a classe 'dark-mode' do body
            body.classList.toggle('dark-mode');

            // Verifica se o modo escuro está ativo para mudar o texto do botão
            if (body.classList.contains('dark-mode')) {
                toggleButton.textContent = 'Acender';
            } else {
                toggleButton.textContent = 'Apagar';
            }
        });
    </script>

    <!-- Marca d'água Clicável --><a href="https://www.instagram.com/ikyaki_/" target="_blank" class="watermark">
        Made by ikyaki_
    </a>

</body>
</html>

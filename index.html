<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acender e Apagar</title>
    <style>
        /* Configuração base */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.6s ease;
            overflow: hidden; /* Impede barras de rolagem */
        }

        /* --- CENA DE FUNDO --- */
        #scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- MODO CLARO (PADRÃO) --- */
        body {
            /* Fundo azul claro para o céu */
            background-color: #87CEEB;
        }

        #sun {
            position: absolute;
            top: 8%;
            right: 10%;
            width: 100px;
            height: 100px;
            background-color: #FFD700; /* Amarelo dourado */
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.7);
            transition: all 0.6s ease;
            opacity: 1;
            transform: scale(1);
        }

        .cloud {
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50px;
            opacity: 0.8;
            transition: all 0.6s ease;
            transform: scale(1);
        }

        /* Criando formas de nuvens */
        #cloud1 {
            top: 20%;
            left: 15%;
            width: 180px;
            height: 60px;
        }
        #cloud1::before, #cloud1::after {
            content: '';
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50%;
        }
        #cloud1::before {
            width: 90px; height: 90px; top: -40px; left: 30px;
        }
        #cloud1::after {
            width: 120px; height: 120px; top: -50px; right: 20px;
        }

        #cloud2 {
            top: 30%;
            right: 20%;
            width: 120px;
            height: 40px;
        }
        #cloud2::before {
            content: '';
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50%;
            width: 70px; height: 70px; top: -30px; left: 20px;
        }

        /* --- MODO ESCURO (DARK MODE) --- */
        
        /* Fundo do céu noturno */
        body.dark-mode {
            background-color: #0b0b23; /* Azul muito escuro */
        }

        /* Esconde o sol e as nuvens no modo escuro */
        body.dark-mode #sun,
        body.dark-mode .cloud {
            opacity: 0;
            transform: scale(0);
        }

        /* Estrelas (usando box-shadow para criar múltiplas estrelas) */
        #stars {
            width: 1px;
            height: 1px;
            position: absolute;
            top: 50%;
            left: 50%;
            background: transparent;
            /* Gera 100 estrelas pequenas aleatoriamente */
            box-shadow: 
                /* Gerador de box-shadow aleatório (exemplo) */
                150px 300px #fff, -200px 100px #fff, 300px -150px #fff,
                -400px -250px #fff, 500px 50px #fff, -350px 200px #fff,
                600px -300px #fff, -500px -100px #fff, 700px 150px #fff,
                -650px -50px #fff, 800px 250px #fff, -750px -150px #fff,
                /* ... (mais estrelas) ... */
                900px 0px #fff, -900px 100px #fff, 1000px 200px #fff,
                -1000px -200px #fff, 1200px 300px #fff, -1200px -300px #fff;
            
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        /* Animação de brilho (piscar) */
        @keyframes twinkle {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        body.dark-mode #stars {
            opacity: 1;
            animation: twinkle 3s infinite;
        }


        /* --- BOTÃO DE CONTROLE --- */
        #theme-toggle {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            background-color: #ffffff;
            
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        #theme-toggle:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            transform: translateX(-50%) translateY(-2px);
        }

        /* Estilo do botão no modo escuro */
        body.dark-mode #theme-toggle {
            background-color: #f0f0f0;
            color: #0b0b23;
        }

        /* --- MARCA D'ÁGUA / WATERMARK --- */
        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #000; /* Cor para o modo claro */
            text-decoration: none;
            opacity: 0.6;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .watermark:hover {
            opacity: 1;
        }

        /* Cor da marca d'água no modo escuro */
        body.dark-mode .watermark {
            color: #fff; /* Cor para o modo escuro */
        }

    </style>
</head>
<body>

    <!-- Os elementos visuais do fundo -->
    <div id="scene">
        <!-- Modo Claro -->
        <div id="sun"></div>
        <div class="cloud" id="cloud1"></div>
        <div class="cloud" id="cloud2"></div>

        <!-- Modo Escuro -->
        <div id="stars"></div>
    </div>

    <!-- O botão de controle -->
    <button id="theme-toggle">Apagar</button>

    <script>
        // Pega o botão e o corpo (body) do documento
        const toggleButton = document.getElementById('theme-toggle');
        const body = document.body;

        // Adiciona um "ouvinte" para o evento de clique
        toggleButton.addEventListener('click', function() {
            
            // Adiciona ou remove a classe 'dark-mode' do body
            body.classList.toggle('dark-mode');

            // Verifica se o modo escuro está ativo para mudar o texto do botão
            if (body.classList.contains('dark-mode')) {
                toggleButton.textContent = 'Acender';
            } else {
                toggleButton.textContent = 'Apagar';
            }
        });
    </script>

    <!-- Marca d'água Clicável -->
    <a href="https://www.instagram.com/ikyaki_/" target="_blank" class="watermark">
        Made by ikyaki_
    </a>

</body>
</html>
